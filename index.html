<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCL-90 症状自评量表</title>
    <style>
        :root { --primary: #4a90e2; --bg: #fdf8f3; --card: #ffffff; }
        body { font-family: 'PingFang SC', system-ui, sans-serif; background-color: var(--bg); color: #333; display: flex; justify-content: center; padding: 20px; line-height: 1.6; }
        .container { background: var(--card); max-width: 600px; width: 100%; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 2rem; }
        .progress-container { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        .question-card { margin-bottom: 2rem; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px; border: 2px solid #f0f0f0; border-radius: 12px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: all 0.2s; }
        .option-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        #result-area { display: none; text-align: center; }
        .score-display { font-size: 3rem; font-weight: bold; color: var(--primary); margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="quiz-area">
            <div class="header">
                <h2>SCL-90 症状自评量表</h2>
                <p>请根据您最近一周的实际感觉选择</p>
            </div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="question-card">
                <h3 id="question-text">正在加载题目...</h3>
                <div class="options">
                    <button class="option-btn" onclick="handleAnswer(1)">没有 (1分)</button>
                    <button class="option-btn" onclick="handleAnswer(2)">很轻 (2分)</button>
                    <button class="option-btn" onclick="handleAnswer(3)">中度 (3分)</button>
                    <button class="option-btn" onclick="handleAnswer(4)">偏重 (4分)</button>
                    <button class="option-btn" onclick="handleAnswer(5)">严重 (5分)</button>
                </div>
            </div>
        </div>

        <div id="result-area">
            <h2>测评报告</h2>
            <p>您的总分为：</p>
            <div class="score-display" id="total-score">0</div>
            <p id="analysis-text"></p>
            <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border:none; background:var(--primary); color:white; border-radius:8px; cursor:pointer;">重新测试</button>
        </div>
    </div>

    <script>
        const questions = [
            "1. 头痛", "2. 神经过敏，心中不踏实", "3. 头脑中有不必要的想法或字句盘旋", "4. 头晕或昏倒", "5. 对异性的兴趣减退", "6. 对旁人有责备感", "7. 感到别人能控制您的思想", "8. 责备自己", "9. 记忆力减退", "10. 担心自己的衣履不整齐",
            "11. 容易烦恼和激动", "12. 胸痛", "13. 害怕空旷的场所或街道", "14. 感到自己的精力下降，活动减慢", "15. 想结束自己的生命", "16. 听到旁人听不到的声音", "17. 发抖", "18. 认为大多数人都不可信任", "19. 胃口不好", "20. 容易哭泣",
            "21. 同异性相处感到害羞不自在", "22. 感到受骗、中了圈套或有人想害您", "23. 无缘无故地突然感到害怕", "24. 自己不能控制地发脾气", "25. 怕单独出门", "26. 经常责备自己", "27. 腰痛", "28. 感到难以完成任务", "29. 感到孤独", "30. 感到苦闷",
            "31. 过分担心", "32. 对事物不感兴趣", "33. 感到恐惧", "34. 您的感情容易受到伤害", "35. 旁人能知道您的私下想法", "36. 感到别人不理解您、不同情您", "37. 感到人们对您不友好，不喜欢您", "38. 做事必须慢慢来以保证做正确", "39. 心跳得很厉害", "40. 恶心或胃部不舒服",
            "41. 感到比不上他人", "42. 肌肉酸痛", "43. 感到有人在监视您、谈论您", "44. 难以入睡", "45. 做事必须反复检查", "46. 难以作出决定", "47. 怕乘电车、公共汽车、地铁或火车", "48. 呼吸困难", "49. 一阵阵发冷或发热", "50. 因为感到害怕而避开某些事物、场合或活动",
            "51. 脑子变空了", "52. 身体发麻或刺痛", "53. 喉咙有哽塞感", "54. 感到前途没有希望", "55. 不能集中注意力", "56. 感到身体的某一部分软弱无力", "57. 感到紧张或吃惊", "58. 感到手或脚沉重", "59. 想到死亡的事", "60. 吃得太多",
            "61. 当别人看着您或谈论您时感到不自在", "62. 有不属于您自己的想法", "63. 有想打人或伤害别人的冲动", "64. 睡不着觉", "65. 必须反复洗手、点数目或触摸某些东西", "66. 睡得不稳不深", "67. 有想摔坏或破坏东西的冲动", "68. 有一些别人没有的想法或信念", "69. 感到对别人格格不入", "70. 在商店或电影院等人多的地方感到不自在",
            "71. 感到任何事情都很困难", "72. 一阵阵恐惧或惊恐", "73. 感到在公共场合吃东西很不舒服", "74. 经常与人争论", "75. 单独一人时神经很紧张", "76. 别人对您的成绩没有给予充分肯定", "77. 感到寂寞", "78. 感到自卑", "79. 有人利用您的弱点", "80. 肚子里不舒服",
            "81. 觉得想哭", "82. 怕鬼或怪兽", "83. 感到难以决定要做的事", "84. 害怕男人或女人", "85. 害怕被别人利用", "86. 对自己的事情犹豫不决", "87. 觉得有东西在跟着您", "88. 您的脑子出了问题", "89. 经常有想不开的事", "90. 感到身体有些部位有病"
        ];

        let currentIndex = 0;
        let totalScore = 0;

        function updateQuiz() {
            if (currentIndex < questions.length) {
                document.getElementById('question-text').innerText = questions[currentIndex];
                document.getElementById('progress-bar').style.width = (currentIndex / questions.length * 100) + "%";
            } else {
                showResult();
            }
        }

        function handleAnswer(score) {
            totalScore += score;
            currentIndex++;
            updateQuiz();
        }

        function showResult() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('total-score').innerText = totalScore;
            
            let analysis = "";
            if (totalScore >= 160) {
                analysis = "测评提示：您的总分超过了临床筛选标准（160分），可能存在一定的心理压力或负面情绪。这不代表心理疾病，但建议您适当放松，或寻求专业人士聊聊。";
            } else {
                analysis = "测评提示：您的总分在正常范围内。请继续保持积极乐观的生活态度！";
            }
            document.getElementById('analysis-text').innerText = analysis;
        }

        updateQuiz();
    </script>
</body>
</html>
