<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCL-90 心理健康测评 | 探索你的内心世界</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --background: #fdf8f3;
            --foreground: #2d2d4a;
            --card: #ffffff;
            --primary: #4ade80; /* 治愈绿 */
            --secondary: #6c5ce7; /* 浪漫紫 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Nunito', 'PingFang SC', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.5s ease;
        }

        .hidden { display: none; }

        /* 进度条样式 */
        .progress-container {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 问题区域样式 - 延续你的果冻感设计 */
        .question-text {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            font-weight: 600;
            min-height: 3.5rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: #f0f0f8;
            color: var(--foreground);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .option-btn:active {
            transform: scale(0.95);
            background: var(--primary);
            color: white;
        }

        /* 结果页面样式 */
        .character-card {
            background: linear-gradient(145deg, #ffffff, #f5f3ff);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .char-icon { font-size: 4rem; margin-bottom: 10px; }
        .char-name { font-size: 1.5rem; font-weight: bold; color: var(--secondary); margin-bottom: 8px; }
        .char-desc { font-size: 0.9rem; color: #666; line-height: 1.5; }

        canvas { margin: 20px 0; max-width: 100%; }

        .restart-btn {
            background: var(--foreground);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="quiz-page">
            <div id="progress-text" style="font-size: 0.8rem; color: #aaa;">1 / 90</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="question-text" id="question-text">正在准备题目...</div>
            <div class="options">
                <button class="option-btn" onclick="handleAnswer(1)">从无</button>
                <button class="option-btn" onclick="handleAnswer(2)">很轻</button>
                <button class="option-btn" onclick="handleAnswer(3)">中度</button>
                <button class="option-btn" onclick="handleAnswer(4)">偏重</button>
                <button class="option-btn" onclick="handleAnswer(5)">严重</button>
            </div>
        </div>

        <div id="result-page" class="hidden">
            <div class="character-card">
                <div class="char-icon" id="char-icon">🌵</div>
                <div class="char-name" id="char-name">内心角色</div>
                <div class="char-desc" id="char-desc">描述加载中...</div>
            </div>
            
            <canvas id="radarChart"></canvas>
            
            <div style="margin: 20px 0;">
                <span style="font-size: 0.9rem; color: #888;">测评总分</span>
                <div style="font-size: 2rem; font-weight: bold;" id="total-score">0</div>
            </div>

            <button class="restart-btn" onclick="location.reload()">重新测试</button>
        </div>
    </div>

    <script>
        const questions = [
            "1. 头痛", "2. 神经过敏，心中不踏实", "3. 头脑中有不必要的想法或字句盘旋", "4. 头晕或昏倒", "5. 对异性的兴趣减退", "6. 对旁人有责备感", "7. 感到别人能控制您的思想", "8. 责备自己", "9. 记忆力减退", "10. 担心自己的衣履不整齐",
            "11. 容易烦恼和激动", "12. 胸痛", "13. 害怕空旷的场所或街道", "14. 感到自己的精力下降，活动减慢", "15. 想结束自己的生命", "16. 听到旁人听不到的声音", "17. 发抖", "18. 认为大多数人都不可信任", "19. 胃口不好", "20. 容易哭泣",
            "21. 同异性相处感到害羞不自在", "22. 感到受骗、中了圈套或有人想害您", "23. 无缘无故地突然感到害怕", "24. 自己不能控制地发脾气", "25. 怕单独出门", "26. 经常责备自己", "27. 腰痛", "28. 感到难以完成任务", "29. 感到孤独", "30. 感到苦闷",
            "31. 过分担心", "32. 对事物不感兴趣", "33. 感到恐惧", "34. 您的感情容易受到伤害", "35. 旁人能知道您的私下想法", "36. 感到别人不理解您、不同情您", "37. 感到人们对您不友好，不喜欢您", "38. 做事必须慢慢来以保证做正确", "39. 心跳得很厉害", "40. 恶心或胃部不舒服",
            "41. 感到比不上他人", "42. 肌肉酸痛", "43. 感到有人在监视您、谈论您", "44. 难以入睡", "45. 做事必须反复检查", "46. 难以作出决定", "47. 怕乘电车、公共汽车、地铁或火车", "48. 呼吸困难", "49. 一阵阵发冷或发热", "50. 因为感到害怕而避开某些事物、场合或活动",
            "51. 脑子变空了", "52. 身体发麻或刺痛", "53. 喉咙有哽塞感", "54. 感到前途没有希望", "55. 不能集中注意力", "56. 感到身体的某一部分软弱无力", "57. 感到紧张或吃惊", "58. 感到手或脚沉重", "59. 想到死亡的事", "60. 吃得太多",
            "61. 当别人看着您或谈论您时感到不自在", "62. 有不属于您自己的想法", "63. 有想打人或伤害别人的冲动", "64. 睡不着觉", "65. 必须反复洗手、点数目或触摸某些东西", "66. 睡得不稳不深", "67. 有想摔坏或破坏东西的冲动", "68. 有一些别人没有的想法或信念", "69. 感到对别人格格不入", "70. 在商店或电影院等人多的地方感到不自在",
            "71. 感到任何事情都很困难", "72. 一阵阵恐惧或惊恐", "73. 感到在公共场合吃东西很不舒服", "74. 经常与人争论", "75. 单独一人时神经很紧张", "76. 别人对您的成绩没有给予充分肯定", "77. 感到寂寞", "78. 感到自卑", "79. 有人利用您的弱点", "80. 肚子里不舒服",
            "81. 觉得想哭", "82. 怕鬼或怪兽", "83. 感到难以决定要做的事", "84. 害怕男人或女人", "85. 害怕被别人利用", "86. 对自己的事情犹豫不决", "87. 觉得有东西在跟着您", "88. 您的脑子出了问题", "89. 经常有想不开的事", "90. 感到身体有些部位有病"
        ];

        const characters = [
            { name: "敏感的小猫", emoji: "🐱", desc: "你对周围环境有着超强的感知力，需要更多的拥抱和安全感。" },
            { name: "秩序的小蜜蜂", emoji: "🐝", desc: "你喜欢生活井井有条，但偶尔也可以允许自己‘乱一点’。" },
            { name: "深海的小鲸鱼", emoji: "🐋", desc: "你有着深沉的情绪海洋，记得时常浮出水面呼吸新鲜空气。" },
            { name: "火爆的小狮子", emoji: "🦁", desc: "你的生命力极其旺盛，只是有时候需要给情绪找个出口。" },
            { name: "警觉的小鹿", emoji: "🦌", desc: "世界稍微有点动静你都能发现，辛苦你一直保持警惕啦。" }
        ];

        let currentIdx = 0;
        let totalScore = 0;

        function updateUI() {
            if (currentIdx < questions.length) {
                document.getElementById('question-text').innerText = questions[currentIdx];
                document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${questions.length}`;
                document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + "%";
            } else {
                showFinalResult();
            }
        }

        function handleAnswer(score) {
            totalScore += score;
            currentIdx++;
            updateUI();
        }

        function showFinalResult() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('total-score').innerText = totalScore;

            // 随机分配一个角色（实际可根据因子分计算，这里先做展示）
            const char = characters[Math.floor(Math.random() * characters.length)];
            document.getElementById('char-icon').innerText = char.emoji;
            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-desc').innerText = char.desc;

            // 绘制雷达图
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['躯体', '强迫', '人际', '抑郁', '焦虑', '敌对', '恐惧', '偏执', '精神性', '其他'],
                    datasets: [{
                        label: '内心维度',
                        data: Array.from({length: 10}, () => Math.random() * 4 + 1), // 模拟数据
                        backgroundColor: 'rgba(74, 222, 128, 0.2)',
                        borderColor: '#4ade80',
                        borderWidth: 2
                    }]
                },
                options: { scales: { r: { min: 0, max: 5, ticks: { display: false } } } }
            });
        }

        updateUI();
    </script>
</body>
</html>
